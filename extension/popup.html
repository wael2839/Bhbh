<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: Segoe UI, sans-serif; width: 380px; margin: 0; padding: 14px; background: #f8fafc; }
    h1 { font-size: 15px; margin: 0 0 6px; color: #1e293b; }
    .auto { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
      padding: 10px; border-radius: 8px; font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
    p { font-size: 12px; color: #64748b; margin: 0 0 8px; line-height: 1.5; }
    pre { background: #0f172a; color: #a5f3fc; padding: 10px; border-radius: 8px; font-size: 10px;
      max-height: 110px; overflow: auto; direction: ltr; text-align: left; white-space: pre-wrap; }
    textarea { width: 100%; min-height: 80px; font-size: 10px; font-family: Consolas, monospace;
      border-radius: 8px; border: 1px solid #e2e8f0; padding: 8px; direction: ltr; margin-top: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin-top: 6px; border: none; border-radius: 8px;
      font-weight: 700; cursor: pointer; font-size: 13px; }
    .secondary { background: #e2e8f0; color: #475569; }
    .primary { background: #1d4ed8; color: #fff; }
    .ok { color: #16a34a; font-size: 12px; min-height: 18px; }
    .err { color: #dc2626; font-size: 12px; }
    details { font-size: 11px; color: #64748b; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>مدد — الربط التلقائي v1.3</h1>
  <div class="auto">
    تظهر رسالة «يتم تصحيح المتصفح» — طبيعية وضرورية لالتقاط الطلبات.<br>
    ارفع ملفاً أو افتح قائمة الملفات في مدد.
  </div>
  <pre id="preview">جاري القراءة...</pre>
  <pre id="debug" style="max-height:60px;font-size:9px;color:#94a3b8;background:#1e293b"></pre>
  <div id="status"></div>
  <button class="secondary" id="refresh">إعادة المزامنة</button>
  <details open>
    <summary>لصق Raw HTTP من DevTools (Copy as cURL / Raw)</summary>
    <textarea id="raw" placeholder="POST /compliance/v1/upload-wage-file HTTP/1.1&#10;Bearer_token: ...&#10;X-Apikey: ..."></textarea>
    <button class="primary" id="paste">استخراج وإرسال للوحة</button>
  </details>
  <script src="popup.js"></script>
</body>
</html>
